name: AI Hedge Fund Analysis

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Stock tickers (comma-separated, e.g. AAPL,MSFT,NVDA)'
        required: true
        default: 'BGNE,PDD,TSM'
      model_name:
        description: 'Model name (default: llama-3.1-8b-instant for Groq)'
        required: true
        default: 'llama-3.1-8b-instant'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run AI Hedge Fund
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FINANCIAL_DATASETS_API_KEY: ${{ secrets.FINANCIAL_DATASETS_API_KEY }}
        run: |
          poetry run python src/main.py \
            --tickers ${{ github.event.inputs.tickers }} \
            --analysts warren_buffett,michael_burry,cathie_wood,stanley_druckenmiller,technical_analyst,fundamentals_analyst,sentiment_analyst,valuation_analyst,growth_analyst,news_sentiment_analyst \
            --model ${{ github.event.inputs.model_name }} \
            --show-reasoning 2>&1 | tee analysis_report.txt

      - name: Send email report
        if: always()
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          TICKERS: ${{ github.event.inputs.tickers }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import smtplib, ssl, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders

          sender = os.environ.get("EMAIL_SENDER", "")
          password = os.environ.get("EMAIL_PASSWORD", "")
          receivers = os.environ.get("EMAIL_RECEIVERS", sender)
          if not sender or not password:
              print("⚠️ EMAIL_SENDER or EMAIL_PASSWORD not set, skipping email.")
              exit(0)

          receiver_list = [r.strip() for r in receivers.split(",") if r.strip()]
          tickers = os.environ.get("TICKERS", "")
          model = os.environ.get("MODEL_NAME", "")
          run_id = os.environ.get("RUN_ID", "")

          msg = MIMEMultipart()
          msg["From"] = sender
          msg["To"] = ", ".join(receiver_list)
          msg["Subject"] = f"AI Hedge Fund Report - {tickers} - {run_id}"

          body = f"AI Hedge Fund Analysis Report\n==============================\nTickers: {tickers}\nModel: {model}\nRun ID: {run_id}\n\nSee attached file for full report."
          msg.attach(MIMEText(body, "plain", "utf-8"))

          report_path = "analysis_report.txt"
          if os.path.exists(report_path):
              with open(report_path, "rb") as f:
                  part = MIMEBase("application", "octet-stream")
                  part.set_payload(f.read())
                  encoders.encode_base64(part)
                  part.add_header("Content-Disposition", f"attachment; filename={report_path}")
                  msg.attach(part)
          else:
              print("⚠️ analysis_report.txt not found, sending without attachment.")

          context = ssl.create_default_context()
          print(f"Connecting to smtp.qq.com:465 ...")
          with smtplib.SMTP_SSL("smtp.qq.com", 465, context=context, timeout=60) as server:
              print("Connected, logging in ...")
              server.login(sender, password)
              print("Logged in, sending ...")
              server.sendmail(sender, receiver_list, msg.as_string())
              print("✅ Email sent successfully!")
          PYEOF

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: analysis_report.txt
